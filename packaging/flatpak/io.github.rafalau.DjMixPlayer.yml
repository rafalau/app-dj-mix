app-id: io.github.rafalau.DjMixPlayer
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: djmixplayer

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio      # PipeWire via compat PulseAudio
  - --filesystem=home        # acesso à biblioteca musical
  - --device=dri             # aceleração GPU para Qt

modules:
  - name: djmixplayer
    buildsystem: simple
    build-commands:
      # Instala o bundle gerado pelo PyInstaller
      - cp -r DJMixPlayer /app/lib/djmixplayer
      - chmod +x /app/lib/djmixplayer/DJMixPlayer
      # Launcher script
      - install -Dm755 djmixplayer.sh /app/bin/djmixplayer
      # Ícone e .desktop
      - install -Dm644 icon_256.png /app/share/icons/hicolor/256x256/apps/io.github.rafalau.DjMixPlayer.png
      - install -Dm644 io.github.rafalau.DjMixPlayer.desktop /app/share/applications/io.github.rafalau.DjMixPlayer.desktop
      - install -Dm644 io.github.rafalau.DjMixPlayer.metainfo.xml /app/share/metainfo/io.github.rafalau.DjMixPlayer.metainfo.xml
    sources:
      - type: dir
        path: .
