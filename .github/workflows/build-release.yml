name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install PyQt6 pygame mutagen sounddevice soundfile numpy pillow pyinstaller

      - name: Generate icon
        run: py assets/create_icon.py

      - name: Build with PyInstaller
        run: pyinstaller djmix.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: powershell

      - name: Compile Inno Setup installer
        run: |
          New-Item -ItemType Directory -Force dist\installer | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\DJMixPlayer.iss
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DJMixPlayer-installer
          path: dist/installer/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "DJ Mix Player ${{ github.ref_name }}"
          body: |
            ## DJ Mix Player ${{ github.ref_name }}

            ### Download
            Baixe o instalador abaixo e execute — não precisa instalar Python nem nada extra.

            ### Instalação
            1. Baixe `DJMixPlayer_Setup_*.exe`
            2. Execute e siga o assistente
            3. Pronto!

            ### Atualização
            O app avisa automaticamente quando há nova versão disponível.
          files: dist/installer/*.exe
          draft: false
          prerelease: false
